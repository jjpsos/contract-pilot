<svg viewBox="0 0 1544 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1544" height="500" fill="url(#bgGradient)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="12" height="500" fill="#2563eb"/>
  
  <!-- Large icon on the left side -->
  <g transform="translate(80, 125)">
    <!-- Document body -->
    <rect x="0" y="0" width="200" height="250" rx="12" fill="#2563eb" stroke="#1e40af" stroke-width="3"/>
    
    <!-- White inner area -->
    <rect x="16" y="16" width="168" height="218" fill="#ffffff"/>
    
    <!-- Contract lines -->
    <line x1="28" y1="40" x2="156" y2="40" stroke="#2563eb" stroke-width="3"/>
    <line x1="28" y1="62" x2="156" y2="62" stroke="#d1d5db" stroke-width="2.5"/>
    <line x1="28" y1="84" x2="156" y2="84" stroke="#d1d5db" stroke-width="2.5"/>
    <line x1="28" y1="106" x2="156" y2="106" stroke="#d1d5db" stroke-width="2.5"/>
    <line x1="28" y1="128" x2="156" y2="128" stroke="#d1d5db" stroke-width="2.5"/>
    <line x1="28" y1="150" x2="130" y2="150" stroke="#d1d5db" stroke-width="2.5"/>
    
    <!-- Checkmark symbol -->
    <g transform="translate(132, 180)">
      <circle cx="0" cy="0" r="24" fill="#10b981" stroke="#059669" stroke-width="2"/>
      <polyline points="-8,0 -2,6 12,-8" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Text on the right side -->
  <g transform="translate(350, 150)">
    <!-- Main title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1e293b">
      Contract Pilot
    </text>
    
    <!-- Tagline -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="36" fill="#475569">
      Manage Contracts & Business Records
    </text>
    
    <!-- Description -->
    <text x="0" y="160" font-family="Arial, sans-serif" font-size="28" fill="#64748b">
      Professional accounting and contract management for WordPress
    </text>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="488" width="1544" height="12" fill="#10b981"/>
</svg>