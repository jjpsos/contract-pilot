<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#f0f4f8"/>
  
  <!-- Main contract/document shape -->
  <g transform="translate(58, 40)">
    <!-- Document body -->
    <rect x="0" y="0" width="140" height="176" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
    
    <!-- White inner area -->
    <rect x="12" y="12" width="116" height="152" fill="#ffffff"/>
    
    <!-- Contract lines -->
    <line x1="20" y1="28" x2="108" y2="28" stroke="#2563eb" stroke-width="2"/>
    <line x1="20" y1="44" x2="108" y2="44" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="20" y1="56" x2="108" y2="56" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="20" y1="68" x2="108" y2="68" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="20" y1="80" x2="108" y2="80" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="20" y1="92" x2="90" y2="92" stroke="#d1d5db" stroke-width="1.5"/>
    
    <!-- Checkmark symbol (contract approved) -->
    <g transform="translate(88, 120)">
      <circle cx="0" cy="0" r="16" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
      <polyline points="-6,0 -2,4 8,-6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>