<svg viewBox="0 0 772 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="772" height="250" fill="url(#bgGradient2)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="250" fill="#2563eb"/>
  
  <!-- Medium icon on left -->
  <g transform="translate(40, 62)">
    <!-- Document body -->
    <rect x="0" y="0" width="100" height="125" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    
    <!-- White inner area -->
    <rect x="8" y="8" width="84" height="109" fill="#ffffff"/>
    
    <!-- Contract lines -->
    <line x1="14" y1="20" x2="78" y2="20" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="14" y1="31" x2="78" y2="31" stroke="#d1d5db" stroke-width="1"/>
    <line x1="14" y1="42" x2="78" y2="42" stroke="#d1d5db" stroke-width="1"/>
    <line x1="14" y1="53" x2="78" y2="53" stroke="#d1d5db" stroke-width="1"/>
    <line x1="14" y1="64" x2="78" y2="64" stroke="#d1d5db" stroke-width="1"/>
    <line x1="14" y1="75" x2="65" y2="75" stroke="#d1d5db" stroke-width="1"/>
    
    <!-- Checkmark symbol -->
    <g transform="translate(66, 90)">
      <circle cx="0" cy="0" r="12" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <polyline points="-4,0 -1,3 6,-4" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Text on right side -->
  <g transform="translate(175, 60)">
    <!-- Main title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#1e293b">
      Contract Pilot
    </text>
    
    <!-- Tagline -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="18" fill="#475569">
      Manage Contracts & Business Records
    </text>
    
    <!-- Description -->
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      Professional accounting and contract management
    </text>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="244" width="772" height="6" fill="#10b981"/>
</svg>